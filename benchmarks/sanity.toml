# Limited sanity subset for quick local checks.
#
# This file intentionally covers only the primary X25519 family on the default
# local port layout. Use `benchmarks/baseline.toml` or a generated matrix for
# full four-group coverage.

[[benchmarks]]
server = "127.0.0.1:4433"
proto = "raw"
mode = "x25519"
verification.kind = "insecure"
server_name = "localhost"
payload = 1024
iters = 5
warmup = 1
concurrency = 1

