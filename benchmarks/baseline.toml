# Benchmark matrix for the main thesis baseline runs.
#
# Local port mapping:
# - 127.0.0.1:4433 => proto='raw', mode='x25519'
# - 127.0.0.1:4434 => proto='http1', mode='x25519'
# - 127.0.0.1:4435 => proto='raw', mode='x25519mlkem768'
# - 127.0.0.1:4436 => proto='http1', mode='x25519mlkem768'
#
# Experiment dimensions:
# - protocol: raw, http1
# - mode: x25519, x25519mlkem768
# - payload: 1024, 10240, 102400, 1048576 bytes
# - concurrency: 1, 10, 100
# - iterations: 200 measured, 20 warmup

[[benchmarks]]
verification.kind = "insecure"
server = "127.0.0.1:4433"
proto = "raw"
mode = "x25519"
payload = 1024
iters = 200
warmup = 20
concurrency = 1

